<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Quản lý sản phẩm với Spring MVC + Thymeleaf">
    <title>Demo Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        :root {
            --bg: #f6f7f3;
            --card: #ffffff;
            --text: #102a43;
            --muted: #567188;
            --accent: #0f766e;
            --accent-dark: #0b5f58;
            --line: #d9e2ec;
            --radius: 18px;
            --shadow: 0 16px 36px rgba(15, 118, 110, 0.12);
        }

        body {
            background:
                    radial-gradient(circle at 5% 10%, #e3f6ef 0%, rgba(227, 246, 239, 0) 45%),
                    radial-gradient(circle at 95% 90%, #fff4d6 0%, rgba(255, 244, 214, 0) 42%),
                    var(--bg);
            color: var(--text);
            font-family: "Be Vietnam Pro", sans-serif;
        }

        .brand-title {
            font-family: "Fraunces", serif;
            letter-spacing: 0.4px;
            font-size: 1.35rem;
            margin-bottom: 0;
        }

        .main-shell {
            min-height: calc(100vh - 168px);
            padding: 26px 0 40px;
        }

        .site-nav {
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.84);
            backdrop-filter: blur(10px);
        }

        .soft-card {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--card);
            box-shadow: var(--shadow);
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
            border: none;
        }

        .btn-accent:hover {
            background: var(--accent-dark);
            color: #fff;
        }

        .footer {
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.93rem;
            padding: 18px 0;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg site-nav">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/products}">
            <span class="brand-title">Product Studio</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Danh sách</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products/create}">Thêm sản phẩm</a>
                </li>
            </ul>
            <form class="d-flex" role="search" th:action="@{/products}" method="get">
                <input class="form-control me-2"
                       type="search"
                       name="keyword"
                       placeholder="Tìm theo tên hoặc danh mục"
                       th:value="${keyword}">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>

<main class="container main-shell" th:replace="${content}"></main>

<footer class="footer">
    <div class="container">
        <span>&copy; 2026 - J2EE Product Demo</span>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
