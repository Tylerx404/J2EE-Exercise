<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: layout(~{::main})}">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
</head>
<body>
<main>
    <div class="soft-card p-4 p-lg-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <h2 class="mb-1">Danh sách sản phẩm</h2>
                <p class="text-secondary mb-0">Quản lý nhanh thông tin, ảnh và danh mục sản phẩm.</p>
            </div>
            <a th:href="@{/products/create}" class="btn btn-accent">+ Tạo sản phẩm mới</a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th scope="col" style="width: 64px;">#</th>
                    <th scope="col" style="min-width: 190px;">Tên</th>
                    <th scope="col">Giá</th>
                    <th scope="col" style="min-width: 180px;">Ảnh</th>
                    <th scope="col">Danh mục</th>
                    <th scope="col" class="text-end">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${listproduct}">
                    <th scope="row" th:text="${product.id}"></th>
                    <td class="fw-semibold" th:text="${product.name}"></td>
                    <td>
                        <span class="badge text-bg-light border" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' VND'}"></span>
                    </td>
                    <td>
                        <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                             th:src="@{'/images/' + ${product.image}}"
                             alt="Product Image"
                             class="rounded-3 border"
                             style="width: 110px; height: 82px; object-fit: cover;">
                        <span th:if="${product.image == null or #strings.isEmpty(product.image)}" class="text-secondary">Chưa có ảnh</span>
                    </td>
                    <td>
                        <span class="badge rounded-pill text-bg-success"
                              th:text="${product.category != null ? product.category.name : '-'}"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-outline-secondary btn-sm">Sửa</a>
                        <a th:href="@{/products/delete/{id}(id=${product.id})}"
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">Xóa</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listproduct)}">
                    <td colspan="6" class="text-center py-5 text-secondary">
                        Không có sản phẩm nào phù hợp. Hãy tạo sản phẩm đầu tiên.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
